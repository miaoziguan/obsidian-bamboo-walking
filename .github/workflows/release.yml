name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BAMBOO_COLUMN_ROOT: ${{ github.workspace }}/bamboo-column

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20.x"

      - name: Checkout plugin repo
        uses: actions/checkout@v5

      - name: Checkout content source repo (sibling)
        uses: actions/checkout@v5
        with:
          repository: miaoziguan/bamboo-column
          path: bamboo-column

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Sync content
        run: npm run sync:content

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: "main.js,styles.css"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
